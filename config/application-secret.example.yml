# ============================================
# 로컬 전용 비밀 설정 예제
# ============================================
# 이 파일을 application-secret.yml로 복사한 뒤
# 각 개발자의 실제 로컬 값을 입력하세요.
#
# config/application-secret.yml은 Git에 올리지 않습니다.

# ============================================
# Server
# ============================================

SERVER_PORT: 8080

# 관리자 개발 화면과 관리자 API 호출에 사용
ADMIN_API_KEY: "change_me"


# ============================================
# MySQL
# compose.yaml 기본값과 맞춰 사용
# ============================================

MYSQL_HOST: localhost
MYSQL_PORT: 3306
MYSQL_DATABASE: youthcenter_search
MYSQL_USERNAME: youthcenter
MYSQL_PASSWORD: youthcenter_password
MYSQL_ROOT_PASSWORD: root_password


# ============================================
# Qdrant
# 로컬 Docker Qdrant는 일반적으로 API Key가 필요 없음
# ============================================

QDRANT_HOST: localhost
QDRANT_REST_PORT: 6333
QDRANT_GRPC_PORT: 6334
QDRANT_API_KEY: ""
QDRANT_COLLECTION_NAME: youthcenter_policies
QDRANT_AUTO_CREATE_COLLECTION: true


# ============================================
# SGIS 행정지역 API
# ============================================

SGIS_CONSUMER_KEY: ""
SGIS_CONSUMER_SECRET: ""

SGIS_REGION_SYNC_ENABLED: false
SGIS_REGION_SYNC_ON_STARTUP: false
SGIS_REGION_SYNC_CRON: "0 0 4 1 * *"


# ============================================
# 온통청년 API
# ============================================

YOUTH_CENTER_ENABLED: true
YOUTH_CENTER_API_KEY: ""


# ============================================
# OpenAI
# ============================================

OPENAI_API_KEY: ""
OPENAI_CHAT_MODEL: gpt-4.1-mini
OPENAI_EMBEDDING_MODEL: text-embedding-3-small


# ============================================
# Spring AI / RAG
# API Key를 넣은 뒤 아래 값을 활성화
# ============================================

SPRING_AI_MODEL_CHAT: none
SPRING_AI_MODEL_EMBEDDING: none
RAG_ENABLED: false


# ============================================
# 온통청년 정책 수집
# ============================================

# false여도 관리자 화면에서 수동 수집은 가능하다.
# true이면 설정된 cron으로 자동 수집한다.
POLICY_COLLECTION_ENABLED: false

POLICY_COLLECTION_CRON: "0 0 3 * * *"
POLICY_COLLECTION_PAGE_SIZE: 100
POLICY_COLLECTION_MAX_PAGES: 1000
POLICY_COLLECTION_REQUEST_DELAY: 300ms
POLICY_DETAIL_REQUEST_DELAY: 200ms
POLICY_COLLECTION_MAX_RETRIES: 3
POLICY_COLLECTION_CONNECT_TIMEOUT: 5s
POLICY_COLLECTION_READ_TIMEOUT: 20s


# ============================================
# 임베딩
# batch-size는 한 번에 처리할 크기이며 전체 정책 수 제한이 아니다.
# ============================================

RAG_EMBEDDING_BATCH_SIZE: 100
RAG_EMBEDDING_MAX_BATCHES_PER_RUN: 1000
RAG_EMBEDDING_REQUEST_DELAY: 50ms
RAG_EMBEDDING_MAX_CONSECUTIVE_FAILURES: 20


# ============================================
# RAG 검색
# ============================================

RAG_SEARCH_TOP_K: 50
RAG_SEARCH_RETRY_TOP_K: 150
RAG_SEARCH_RESULT_SIZE: 20
RAG_MINIMUM_SIMILARITY: 0.55
RAG_INCLUDE_UNKNOWN_REGION: false
RAG_MYSQL_FALLBACK_ENABLED: true


# ============================================
# 지역 재계산
# ============================================

REGION_REBUILD_BATCH_SIZE: 100
REGION_REBUILD_ENQUEUE_CHANGED_POLICIES: true
